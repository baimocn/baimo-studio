services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5180:5180"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5180/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
